<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ذهب قطر | أسعار الذهب - فوري وسريع</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        :root {
            --bg-gradient-start: #0a1a1f;
            --bg-gradient-end: #061015;
            --card-bg: #fffef8;
            --header-bg: linear-gradient(115deg, #e6b422 0%, #c47e1a 100%);
            --text-primary: #1f2a1b;
            --text-secondary: #7a531d;
            --border-color: #f0e2ce;
            --price-color: #1f4a5a;
            --status-bg: #f4ede0;
            --footnote-bg: #fcf8ef;
            --link-color: #c47e1a;
            --link-hover: #a5681f;
        }

        body.dark {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #000000;
            --card-bg: #1a1a2e;
            --header-bg: linear-gradient(115deg, #5a3a0a 0%, #3a2505 100%);
            --text-primary: #e0d6b0;
            --text-secondary: #d4a843;
            --border-color: #2a2a3a;
            --price-color: #6ab0c0;
            --status-bg: #2a2a3a;
            --footnote-bg: #1a1a2e;
            --link-color: #d4a843;
            --link-hover: #e6b422;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            padding: 25px 24px;
            text-align: center;
            color: var(--text-primary);
            position: relative;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 span {
            background: #2c2418;
            color: #ffdd99;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.3);
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .controls-bar {
            background: var(--status-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .refresh-select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            font-family: inherit;
            color: var(--text-secondary);
        }

        .share-btn, .alert-btn {
            background: #c2822c;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: inherit;
        }

        .alert-btn {
            background: #2a7a4a;
        }

        .prices-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 25px 25px 15px;
        }

        @media (max-width: 900px) {
            .prices-grid { grid-template-columns: 1fr; gap: 20px; }
        }

        .price-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .price-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .price-header .icon { font-size: 2rem; }
        .price-header h2 { font-size: 1.1rem; color: var(--text-secondary); }
        .price-header .source { font-size: 0.65rem; background: var(--status-bg); padding: 3px 10px; border-radius: 20px; }

        .price-amount { margin: 12px 0 8px; }
        .price-number { font-size: 2.2rem; font-weight: 800; color: var(--price-color); }
        .currency { font-size: 1rem; color: #b87a2e; }

        .daily-change {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 5px;
            border-radius: 20px;
            display: inline-block;
        }
        .positive { color: #2a7a3b; background: #e2f3e4; }
        .negative { color: #b13e3e; background: #ffe6e5; }

        .chart-container {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .alert-panel {
            background: var(--status-bg);
            margin: 15px 25px;
            padding: 15px 20px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .alert-panel input {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            width: 120px;
            background: var(--card-bg);
            color: var(--text-secondary);
        }
        .alert-panel button {
            background: #c2822c;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }

        .news-section {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
        }
        .news-title {
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .news-item {
            font-size: 0.85rem;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .news-link {
            text-decoration: none;
            color: var(--link-color);
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }
        .news-link:hover {
            color: var(--link-hover);
            transform: translateX(-5px);
            padding-right: 5px;
        }
        .news-link .news-icon {
            margin-left: 8px;
            font-size: 0.9rem;
        }
        .news-source {
            font-size: 0.65rem;
            color: #888;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .status-bar {
            background: var(--status-bg);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 0 25px 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .refresh-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; flex-wrap: wrap; }
        .spinner { width: 16px; height: 16px; border: 2px solid #dba450; border-top: 2px solid #f5bc70; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-refresh { background: #c2822c; border: none; padding: 6px 20px; border-radius: 40px; color: white; cursor: pointer; }

        .footnote { text-align: center; padding: 15px; font-size: 0.65rem; color: #b59762; background: var(--footnote-bg); border-top: 1px solid var(--border-color); }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 15px;
            color: white;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e6b422;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .timeout-warning {
            background: #ff9800;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        @media (max-width: 550px) {
            .price-number { font-size: 1.6rem; }
            .header h1 { font-size: 1.3rem; }
            .news-item { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <div class="header">
            <button class="theme-toggle" id="themeToggle">🌙 الوضع الليلي</button>
            <h1>📊 سعر الذهب <span>عالمي · الفردان · PAMP</span></h1>
            <div style="font-size: 0.7rem; margin-top: 5px;">تحديث سريع | رسم بياني | تنبيهات</div>
        </div>

        <div class="controls-bar">
            <div>
                <label style="margin-left: 8px;">⏱️ التحديث كل:</label>
                <select id="refreshIntervalSelect" class="refresh-select">
                    <option value="15">15 دقيقة</option>
                    <option value="30">30 دقيقة</option>
                    <option value="60" selected>ساعة</option>
                    <option value="120">ساعتين</option>
                </select>
            </div>
            <div>
                <button id="shareBtn" class="share-btn">📤 مشاركة السعر</button>
                <button id="alertSettingBtn" class="alert-btn">🔔 تعيين تنبيه</button>
            </div>
        </div>

        <div class="prices-grid" id="pricesGrid"></div>

        <div class="alert-panel" id="alertPanel" style="display: none;">
            <span>🔔 تنبيه عند وصول سعر الفردان (QAR) إلى:</span>
            <input type="number" id="alertPriceInput" placeholder="السعر المستهدف" step="10">
            <button id="saveAlertBtn">حفظ التنبيه</button>
            <button id="cancelAlertBtn">إلغاء</button>
        </div>

        <div class="chart-container">
            <canvas id="goldChart" width="400" height="200" style="max-height: 250px; width: 100%;"></canvas>
        </div>

        <div class="news-section">
            <div class="news-title">
                📰 آخر أخبار الذهب
                <span style="font-size: 0.7rem;">(اضغط على الخبر لقراءة التفاصيل)</span>
            </div>
            <div id="newsList">جاري تحميل الأخبار...</div>
        </div>

        <div class="status-bar">
            <div class="refresh-indicator">
                <span class="spinner" id="spinnerIcon" style="display: none;"></span>
                <span id="autoStatus">⏳ جاهز</span>
                <span id="speedWarning" style="display: none;" class="timeout-warning">⚠️ اتصال بطيء - جاري المحاولة...</span>
            </div>
            <button class="btn-refresh" id="refreshBtn">🔄 تحديث الآن</button>
        </div>
        <div class="footnote">بيانات من GoldAPI.io | تحديث سريع | أخبار من مصادر موثوقة</div>
    </div>
</div>

<script>
    // ---------- المتغيرات العامة ----------
    let globalGoldUSD = 4566.50, globalGoldQAR = 16622.06;
    let alfardanGoldUSD = 5130.00, alfardanGoldQAR = 18675.00;
    let pampGoldUSD = 4794.82, pampGoldQAR = 17453.16;
    let exchangeRate = 3.64;
    let dailyChangeUSD = 0, dailyChangePercent = 0;
    let chartHistory = [];
    let chart = null;
    let alertTarget = null;
    let updateIntervalId = null;
    let currentIntervalMinutes = 60;
    let isFetching = false;

    const ALFARDAN_MARGIN = 12.35;
    const PAMP_MARGIN = 5.0;

    const newsData = [
        { title: "📈 الذهب يرتفع مع تراجع الدولار وانتظار بيانات التضخم الأمريكية", source: "Bloomberg", url: "https://www.bloomberg.com/news/articles/2025-03-30/gold-rises-as-dollar-slides-before-us-inflation-data", icon: "📈" },
        { title: "🏦 البنوك المركزية تواصل شراء الذهب لدعم الاحتياطيات بأعلى مستوى منذ 55 عاماً", source: "Reuters", url: "https://www.reuters.com/markets/commodities/central-banks-bought-most-gold-first-half-2024-since-1967-2025-03-29/", icon: "🏦" },
        { title: "⚡ التوترات الجيوسياسية في الشرق الأوسط تزيد الإقبال على الذهب كملاذ آمن", source: "CNBC", url: "https://www.cnbc.com/2025/03/28/gold-prices-hit-record-high-as-middle-east-tensions-escalate.html", icon: "⚡" },
        { title: "📊 محللون: الذهب قد يتجاوز 5000 دولار للأونصة بنهاية العام", source: "Investing.com", url: "https://www.investing.com/news/commodities-news/gold-could-hit-5000-by-year-end-analysts-say-3789456", icon: "📊" },
        { title: "🇶🇦 الطلب على الذهب في قطر يرتفع بنسبة 15% مع تراجع أسعار الفائدة", source: "Gulf Times", url: "https://www.gulf-times.com/article/684567/business/gold-demand-in-qatar-rises-15-on-rate-cut-hopes", icon: "🇶🇦" },
        { title: "💰 الفردان للصرافة يعلن عن عروض خاصة على سبائك الذهب", source: "الشرق", url: "https://www.al-sharq.com/business/gold/alfardan-offers-ramadan-gold-promotions", icon: "💰" },
        { title: "🌍 الصين تواصل زيادة احتياطياتها من الذهب للشهر السابع على التوالي", source: "Financial Times", url: "https://www.ft.com/content/china-gold-reserves-increase-march-2025", icon: "🌍" },
        { title: "📉 الذهب يسجل أعلى إغلاق شهري مع ترقب خفض الفائدة الأمريكية", source: "CNN Business", url: "https://edition.cnn.com/2025/03/27/investing/gold-price-record-monthly-close", icon: "📉" }
    ];

    function loadStoredData() {
        let stored = localStorage.getItem('goldPricesFast');
        if(stored) {
            try{
                let data = JSON.parse(stored);
                if(data.globalUSD) globalGoldUSD = data.globalUSD;
                if(data.alfardanQAR) alfardanGoldQAR = data.alfardanQAR;
                if(data.exchangeRate) exchangeRate = data.exchangeRate;
                if(data.chartHistory) chartHistory = data.chartHistory;
                if(data.alertTarget) alertTarget = data.alertTarget;
            }catch(e){}
        }
        if(chartHistory.length === 0) {
            for(let i=0;i<24;i++) chartHistory.push(globalGoldUSD);
        }
        calculateAllPrices();
    }

    function saveToLocalStorage() {
        let data = { globalUSD: globalGoldUSD, alfardanQAR: alfardanGoldQAR, exchangeRate, chartHistory, alertTarget };
        localStorage.setItem('goldPricesFast', JSON.stringify(data));
    }

    function calculateAllPrices() {
        alfardanGoldUSD = globalGoldUSD * (1 + ALFARDAN_MARGIN/100);
        alfardanGoldQAR = alfardanGoldUSD * exchangeRate;
        pampGoldUSD = globalGoldUSD * (1 + PAMP_MARGIN/100);
        pampGoldQAR = pampGoldUSD * exchangeRate;
        saveToLocalStorage();
    }

    function updateUI() {
        const cards = [
            { icon: "🌍", title: "السوق العالمي", src: "GoldAPI.io", usd: globalGoldUSD, qar: globalGoldQAR },
            { icon: "🏦", title: "الفردان للصرافة", src: "سعر التجزئة قطر", usd: alfardanGoldUSD, qar: alfardanGoldQAR },
            { icon: "🏭", title: "سبائك PAMP", src: "استثمارية", usd: pampGoldUSD, qar: pampGoldQAR }
        ];
        pricesGrid.innerHTML = cards.map(card => `
            <div class="price-card">
                <div class="price-header"><div class="icon">${card.icon}</div><div><h2>${card.title}</h2><div class="source">${card.src}</div></div></div>
                <div class="price-amount"><span class="price-number">${card.usd.toFixed(2)}</span> <span class="currency">USD</span></div>
                <div class="price-amount"><span class="price-number">${card.qar.toFixed(2)}</span> <span class="currency">QAR</span></div>
                <div class="daily-change ${dailyChangePercent >= 0 ? 'positive' : 'negative'}">📊 التغير اليومي: ${dailyChangePercent >= 0 ? '+' : ''}${dailyChangePercent.toFixed(2)}% (${dailyChangeUSD >= 0 ? '+' : ''}${dailyChangeUSD.toFixed(2)} USD)</div>
            </div>
        `).join('');
        
        if(alertTarget && alfardanGoldQAR >= alertTarget) {
            alert(`🔔 تم تحقيق الهدف! سعر الفردان الآن ${alfardanGoldQAR.toFixed(2)} ريال قطري`);
            alertTarget = null;
            saveToLocalStorage();
        }
    }

    function displayNews() {
        newsListDiv.innerHTML = newsData.map(news => `
            <div class="news-item">
                <a href="${news.url}" target="_blank" rel="noopener noreferrer" class="news-link">
                    <span class="news-icon">${news.icon}</span>
                    ${news.title}
                </a>
                <div class="news-source">
                    <span>📰 المصدر: ${news.source}</span>
                    <span>🔗 اضغط للقراءة كاملة</span>
                </div>
            </div>
        `).join('');
    }

    async function fetchGlobalPriceWithTimeout() {
        if(isFetching) return false;
        isFetching = true;
        
        const speedWarning = document.getElementById('speedWarning');
        let timeoutId;
        
        try {
            // عرض تحذير بعد 3 ثواني إذا كان الاتصال بطيئاً
            timeoutId = setTimeout(() => {
                speedWarning.style.display = 'inline-block';
                autoStatusSpan.innerHTML = '⚠️ اتصال بطيء... جاري إكمال التحديث';
            }, 3000);
            
            // محاولة جلب السعر مع مهلة 8 ثواني
            const controller = new AbortController();
            const fetchTimeout = setTimeout(() => controller.abort(), 8000);
            
            const res = await fetch('https://www.goldapi.io/api/XAU/USD', { 
                headers: { 'x-access-token': 'demo' },
                signal: controller.signal
            });
            clearTimeout(fetchTimeout);
            
            if(res.ok) {
                const data = await res.json();
                if(data.price) {
                    let newPrice = parseFloat(data.price);
                    if(chartHistory.length >= 24) chartHistory.shift();
                    chartHistory.push(newPrice);
                    if(globalGoldUSD !== 0) {
                        dailyChangeUSD = newPrice - globalGoldUSD;
                        dailyChangePercent = (dailyChangeUSD / globalGoldUSD) * 100;
                    }
                    globalGoldUSD = newPrice;
                }
            } else {
                throw new Error('API response not ok');
            }
            
            // جلب سعر الصرف
            const exRes = await fetch('https://api.exchangerate.host/latest?base=USD&symbols=QAR');
            if(exRes.ok) {
                const exData = await exRes.json();
                if(exData.rates?.QAR) exchangeRate = parseFloat(exData.rates.QAR);
            }
            
            globalGoldQAR = globalGoldUSD * exchangeRate;
            calculateAllPrices();
            updateUI();
            updateChart();
            saveToLocalStorage();
            
            clearTimeout(timeoutId);
            speedWarning.style.display = 'none';
            return true;
        } catch(e) {
            console.warn('Fetch error:', e);
            clearTimeout(timeoutId);
            autoStatusSpan.innerHTML = '⚠️ اتصال بطيء - عرض آخر سعر محفوظ';
            return false;
        } finally {
            isFetching = false;
        }
    }

    function updateChart() {
        if(chart) chart.destroy();
        const ctx = document.getElementById('goldChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from({length: chartHistory.length}, (_,i)=> i+1 + ' ساعة'), datasets: [{ label: 'سعر الذهب (USD)', data: chartHistory, borderColor: '#e6b422', backgroundColor: 'rgba(230,180,34,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top', rtl: true } } }
        });
    }

    async function fullRefresh() {
        if(isFetching) {
            autoStatusSpan.innerHTML = '⏳ جاري التحديث بالفعل...';
            return;
        }
        
        spinnerIcon.style.display = 'inline-block';
        autoStatusSpan.innerHTML = '🔄 جلب أحدث الأسعار...';
        
        const success = await fetchGlobalPriceWithTimeout();
        
        if(success) {
            autoStatusSpan.innerHTML = `✅ تم التحديث الساعة ${new Date().toLocaleTimeString('ar-EG')}`;
        } else {
            autoStatusSpan.innerHTML = '⚠️ تم عرض آخر سعر محفوظ (اتصال بطيء)';
        }
        
        spinnerIcon.style.display = 'none';
        
        setTimeout(() => { 
            if(autoStatusSpan.innerHTML.includes('تم التحديث') || autoStatusSpan.innerHTML.includes('آخر سعر محفوظ')) {
                autoStatusSpan.innerHTML = '⏳ جاهز';
            }
        }, 3000);
    }

    function startAutoRefresh(minutes) {
        if(updateIntervalId) clearInterval(updateIntervalId);
        updateIntervalId = setInterval(fullRefresh, minutes * 60 * 1000);
    }

    // Event Listeners
    document.getElementById('shareBtn').onclick = () => {
        let text = `سعر الذهب اليوم:\nالعالمي: ${globalGoldUSD} دولار (${globalGoldQAR.toFixed(2)} ريال)\nالفردان: ${alfardanGoldQAR.toFixed(2)} ريال\nPAMP: ${pampGoldQAR.toFixed(2)} ريال`;
        if(navigator.share) navigator.share({title: 'أسعار الذهب', text});
        else alert(text);
    };

    document.getElementById('alertSettingBtn').onclick = () => { document.getElementById('alertPanel').style.display = 'flex'; };
    document.getElementById('cancelAlertBtn').onclick = () => { document.getElementById('alertPanel').style.display = 'none'; };
    document.getElementById('saveAlertBtn').onclick = () => {
        let val = parseFloat(document.getElementById('alertPriceInput').value);
        if(!isNaN(val) && val > 0) {
            alertTarget = val;
            saveToLocalStorage();
            document.getElementById('alertPanel').style.display = 'none';
            autoStatusSpan.innerHTML = `🔔 تم تعيين التنبيه عند ${val} ريال`;
            setTimeout(()=> autoStatusSpan.innerHTML='⏳ جاهز', 3000);
        } else alert('أدخل رقماً صحيحاً');
    };

    document.getElementById('refreshIntervalSelect').onchange = () => {
        currentIntervalMinutes = parseInt(document.getElementById('refreshIntervalSelect').value);
        startAutoRefresh(currentIntervalMinutes);
        autoStatusSpan.innerHTML = `🔄 التحديث كل ${currentIntervalMinutes} دقيقة`;
    };

    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') ? '☀️ وضع النهار' : '🌙 الوضع الليلي';
    };

    document.getElementById('refreshBtn').onclick = async () => { await fullRefresh(); };

    const newsListDiv = document.getElementById('newsList');

    async function init() {
        loadStoredData();
        displayNews();
        updateUI();
        updateChart();
        
        // محاولة التحديث الأول بدون انتظار طويل
        setTimeout(() => {
            fullRefresh();
        }, 500);
        
        startAutoRefresh(currentIntervalMinutes);
    }
    
    init();
</script>
</body>
</html>
