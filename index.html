<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذهب قطر | أسعار الذهب</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {font-family: Arial; background:#111; color:#fff; padding:20px}
.news-item {padding:10px;border-bottom:1px solid #333}
.news-link {color:#e6b422;text-decoration:none}
.news-link:hover {color:#fff}
button {padding:10px 15px; margin:10px; cursor:pointer}
</style>
</head>

<body>

<h2>📊 سعر الذهب</h2>

<button id="refreshBtn">🔄 تحديث الآن</button>

<div id="newsList">⏳ جاري تحميل الأخبار...</div>

<canvas id="goldChart"></canvas>

<script>

// ---------- المتغيرات ----------
let globalGoldUSD = 4566.50;
let exchangeRate = 3.64;
let chartHistory = [];
let chart = null;
let isFetching = false;

// ---------- تحميل البيانات ----------
function loadStoredData() {
    if(chartHistory.length === 0){
        for(let i=0;i<24;i++) chartHistory.push(globalGoldUSD);
    }
}

// ---------- عرض الأخبار (محدثة 🔥) ----------
async function displayNews() {
    const newsListDiv = document.getElementById('newsList');
    newsListDiv.innerHTML = "⏳ جاري تحميل الأخبار...";

    try {
        const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=gold&hl=ar&gl=QA&ceid=QA:ar");
        const data = await res.json();

        if (data.items && data.items.length > 0) {

            newsListDiv.innerHTML = data.items.slice(0, 6).map(news => `
                <div class="news-item">
                    <a href="${news.link}" target="_blank" class="news-link">
                        📰 ${news.title}
                    </a>
                    <div style="font-size:12px;color:#aaa;">
                        ⏱️ ${new Date(news.pubDate).toLocaleString('ar-EG')}
                    </div>
                </div>
            `).join('');

        } else {
            newsListDiv.innerHTML = "⚠️ لا توجد أخبار حالياً";
        }

    } catch (e) {
        newsListDiv.innerHTML = "⚠️ فشل تحميل الأخبار";
    }
}

// ---------- الرسم ----------
function updateChart() {
    if(chart) chart.destroy();

    const ctx = document.getElementById('goldChart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartHistory.map((_,i)=>i),
            datasets: [{
                data: chartHistory,
                borderColor: '#e6b422',
                fill: true
            }]
        },
        options: {
            animation: false,
            responsive: true
        }
    });
}

// ---------- جلب السعر ----------
async function fetchData() {
    if(isFetching) return;
    isFetching = true;

    try {
        const res = await fetch('https://www.goldapi.io/api/XAU/USD', {
            headers: { 'x-access-token': 'demo' }
        });

        if(res.ok){
            const data = await res.json();
            globalGoldUSD = data.price;

            if(chartHistory.length >= 24) chartHistory.shift();
            chartHistory.push(globalGoldUSD);
        }

        updateChart();

    } catch(e) {
        console.log("error");
    }

    isFetching = false;
}

// ---------- التحديث الكامل ----------
async function fullRefresh() {
    await fetchData();
    await displayNews(); // 🔥 تحديث الأخبار أيضاً
}

// ---------- التهيئة ----------
function init() {

    loadStoredData();

    // 🔥 تحميل الأخبار فوراً
    requestAnimationFrame(() => {
        displayNews();
    });

    // تحميل الشارت
    setTimeout(() => {
        updateChart();
    }, 0);

    // تحديث البيانات بعد قليل
    setTimeout(() => {
        fetchData();
    }, 500);
}

document.getElementById('refreshBtn').onclick = fullRefresh;

init();

</script>
</body>
</html>
