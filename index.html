<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ذهب قطر | أسعار الذهب - أخبار محدثة لحظياً</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-gradient-start: #0a1a1f;
            --bg-gradient-end: #061015;
            --card-bg: #fffef8;
            --header-bg: linear-gradient(115deg, #e6b422 0%, #c47e1a 100%);
            --text-primary: #1f2a1b;
            --text-secondary: #7a531d;
            --border-color: #f0e2ce;
            --price-color: #1f4a5a;
            --status-bg: #f4ede0;
            --footnote-bg: #fcf8ef;
            --link-color: #c47e1a;
            --link-hover: #a5681f;
        }

        body.dark {
            --bg-gradient-start: #0a0a0a;
            --bg-gradient-end: #000000;
            --card-bg: #1a1a2e;
            --header-bg: linear-gradient(115deg, #5a3a0a 0%, #3a2505 100%);
            --text-primary: #e0d6b0;
            --text-secondary: #d4a843;
            --border-color: #2a2a3a;
            --price-color: #6ab0c0;
            --status-bg: #2a2a3a;
            --footnote-bg: #1a1a2e;
            --link-color: #d4a843;
            --link-hover: #e6b422;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        .main-card {
            background: var(--card-bg);
            border-radius: 48px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            overflow: hidden;
        }

        .header {
            background: var(--header-bg);
            padding: 25px 24px;
            text-align: center;
            color: var(--text-primary);
            position: relative;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header h1 span {
            background: #2c2418;
            color: #ffdd99;
            padding: 5px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.3);
            border: none;
            border-radius: 50px;
            padding: 8px 15px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .last-update-info {
            font-size: 0.7rem;
            margin-top: 8px;
            opacity: 0.8;
        }

        .controls-bar {
            background: var(--status-bg);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .refresh-select {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 30px;
            font-family: inherit;
            color: var(--text-secondary);
        }

        .share-btn, .alert-btn, .news-refresh-btn {
            background: #c2822c;
            border: none;
            padding: 6px 15px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-family: inherit;
        }

        .news-refresh-btn {
            background: #2a7a4a;
            font-size: 0.75rem;
        }

        .alert-btn {
            background: #2a7a4a;
        }

        .prices-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 25px 25px 15px;
        }

        @media (max-width: 900px) {
            .prices-grid { grid-template-columns: 1fr; gap: 20px; }
        }

        .price-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .price-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        .price-header .icon { font-size: 2rem; }
        .price-header h2 { font-size: 1.1rem; color: var(--text-secondary); }
        .price-header .source { font-size: 0.65rem; background: var(--status-bg); padding: 3px 10px; border-radius: 20px; }

        .price-amount { margin: 12px 0 8px; }
        .price-number { font-size: 2.2rem; font-weight: 800; color: var(--price-color); }
        .currency { font-size: 1rem; color: #b87a2e; }

        .daily-change {
            font-size: 0.75rem;
            margin-top: 8px;
            padding: 5px;
            border-radius: 20px;
            display: inline-block;
        }
        .positive { color: #2a7a3b; background: #e2f3e4; }
        .negative { color: #b13e3e; background: #ffe6e5; }

        .chart-container {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .news-section {
            padding: 20px 25px;
            border-top: 1px solid var(--border-color);
        }
        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .news-title {
            font-weight: bold;
            color: var(--text-secondary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .news-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .news-item {
            font-size: 0.85rem;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
        }
        .news-link {
            text-decoration: none;
            color: var(--link-color);
            display: block;
            transition: all 0.2s;
            cursor: pointer;
        }
        .news-link:hover {
            color: var(--link-hover);
            transform: translateX(-5px);
            padding-right: 5px;
        }
        .news-icon {
            margin-left: 8px;
            font-size: 0.9rem;
        }
        .news-source {
            font-size: 0.65rem;
            color: #888;
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .news-time {
            font-size: 0.6rem;
            color: #aaa;
        }

        .status-bar {
            background: var(--status-bg);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 0 25px 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .refresh-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; flex-wrap: wrap; }
        .spinner { width: 16px; height: 16px; border: 2px solid #dba450; border-top: 2px solid #f5bc70; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-refresh { background: #c2822c; border: none; padding: 6px 20px; border-radius: 40px; color: white; cursor: pointer; }

        .footnote { text-align: center; padding: 15px; font-size: 0.65rem; color: #b59762; background: var(--footnote-bg); border-top: 1px solid var(--border-color); }

        @media (max-width: 550px) {
            .price-number { font-size: 1.6rem; }
            .header h1 { font-size: 1.3rem; }
            .news-item { font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-card">
        <div class="header">
            <button class="theme-toggle" id="themeToggle">🌙 الوضع الليلي</button>
            <h1>📊 سعر الذهب <span>عالمي · الفردان · PAMP</span></h1>
            <div class="last-update-info" id="lastUpdateInfo">🔄 جاري تحميل أحدث البيانات...</div>
        </div>

        <div class="controls-bar">
            <div>
                <label style="margin-left: 8px;">⏱️ التحديث كل:</label>
                <select id="refreshIntervalSelect" class="refresh-select">
                    <option value="15">15 دقيقة</option>
                    <option value="30">30 دقيقة</option>
                    <option value="60" selected>ساعة</option>
                    <option value="120">ساعتين</option>
                </select>
            </div>
            <div>
                <button id="shareBtn" class="share-btn">📤 مشاركة السعر</button>
                <button id="alertSettingBtn" class="alert-btn">🔔 تعيين تنبيه</button>
                <button id="newsRefreshBtn" class="news-refresh-btn">🔄 تحديث الأخبار</button>
            </div>
        </div>

        <div class="prices-grid" id="pricesGrid"></div>

        <div class="alert-panel" id="alertPanel" style="display: none; background: var(--status-bg); margin: 15px 25px; padding: 15px 20px; border-radius: 28px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;">
            <span>🔔 تنبيه عند وصول سعر الفردان (QAR) إلى:</span>
            <input type="number" id="alertPriceInput" placeholder="السعر المستهدف" step="10" style="padding: 8px 12px; border-radius: 30px; border: 1px solid var(--border-color); width: 120px; background: var(--card-bg);">
            <button id="saveAlertBtn" style="background: #c2822c; border: none; padding: 8px 18px; border-radius: 30px; color: white; cursor: pointer;">حفظ التنبيه</button>
            <button id="cancelAlertBtn" style="background: #c2822c; border: none; padding: 8px 18px; border-radius: 30px; color: white; cursor: pointer;">إلغاء</button>
        </div>

        <div class="chart-container">
            <canvas id="goldChart" width="400" height="200" style="max-height: 250px; width: 100%;"></canvas>
        </div>

        <div class="news-section">
            <div class="news-header">
                <div class="news-title">
                    📰 آخر أخبار الذهب
                    <span style="font-size: 0.7rem;">(محدثة تلقائياً)</span>
                </div>
                <div id="newsUpdateTime" style="font-size: 0.65rem; color: #888;">آخر تحديث للأخبار: --:--:--</div>
            </div>
            <div id="newsList" class="news-list">⏳ جاري تحميل الأخبار...</div>
        </div>

        <div class="status-bar">
            <div class="refresh-indicator">
                <span class="spinner" id="spinnerIcon" style="display: none;"></span>
                <span id="autoStatus">⏳ جاهز</span>
            </div>
            <button class="btn-refresh" id="refreshBtn">🔄 تحديث الأسعار الآن</button>
        </div>
        <div class="footnote">بيانات من GoldAPI.io | أخبار محدثة تلقائياً مع كل تشغيل للصفحة | تحديث دوري للأخبار كل ساعة</div>
    </div>
</div>

<script>
    // ---------- المتغيرات العامة ----------
    let globalGoldUSD = 4566.50, globalGoldQAR = 16622.06;
    let alfardanGoldUSD = 5130.00, alfardanGoldQAR = 18675.00;
    let pampGoldUSD = 4794.82, pampGoldQAR = 17453.16;
    let exchangeRate = 3.64;
    let dailyChangeUSD = 0, dailyChangePercent = 0;
    let chartHistory = [];
    let chart = null;
    let alertTarget = null;
    let updateIntervalId = null;
    let newsUpdateIntervalId = null;
    let currentIntervalMinutes = 60;
    let isFetching = false;

    const ALFARDAN_MARGIN = 12.35;
    const PAMP_MARGIN = 5.0;

    // قائمة الأخبار المحدثة (سيتم تحديثها مع كل تحميل)
    let currentNewsData = [];

    // أخبار احتياطية في حالة فشل التحميل
    const fallbackNews = [
        { title: "📈 الذهب عند أعلى مستوى في 3 أشهر مع تراجع الدولار", source: "Bloomberg", url: "https://www.bloomberg.com/news/articles/2025-03-31/gold-hits-3-month-high", icon: "📈", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "🏦 صندوق النقد الدولي: البنوك المركزية زادت مشتريات الذهب بنسبة 25%", source: "Reuters", url: "https://www.reuters.com/markets/commodities/imf-central-banks-gold-purchases-2025-03-31/", icon: "🏦", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "⚡ التوترات الجيوسياسية تدفع المستثمرين نحو الذهب", source: "CNBC", url: "https://www.cnbc.com/2025/03/31/geopolitical-tensions-drive-gold-demand.html", icon: "⚡", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "📊 محللون: توقعات بارتفاع الذهب إلى 5500 دولار نهاية 2025", source: "Investing.com", url: "https://www.investing.com/news/commodities-news/gold-forecast-2025-3789999", icon: "📊", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "🇶🇦 قطر: ارتفاع الطلب على الذهب مع اقتراب العيد", source: "Gulf Times", url: "https://www.gulf-times.com/article/684600/business/qatar-gold-demand-rises", icon: "🇶🇦", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "💰 الفردان للصرافة: إقبال كبير على شراء السبائك", source: "الشرق", url: "https://www.al-sharq.com/business/gold/alfardan-gold-demand", icon: "💰", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "🌍 الاحتياطي الصيني يواصل شراء الذهب للشهر الثامن", source: "Financial Times", url: "https://www.ft.com/content/china-gold-reserves-march-2025", icon: "🌍", time: new Date().toLocaleTimeString('ar-EG') },
        { title: "📉 الذهب يسجل أفضل أداء ربع سنوي منذ 2020", source: "CNN Business", url: "https://edition.cnn.com/2025/03/31/investing/gold-best-quarter-since-2020", icon: "📉", time: new Date().toLocaleTimeString('ar-EG') }
    ];

    // وظيفة لجلب أخبار جديدة من مصادر متعددة
    async function fetchLatestNews() {
        try {
            // محاولة جلب أخبار من RSS feed (Bloomberg - Gold News)
            const newsSources = [
                { url: 'https://feeds.bloomberg.com/markets/news.rss', parser: 'rss' },
                { url: 'https://www.investing.com/rss/news_301.rss', parser: 'rss' }
            ];
            
            let fetchedNews = [];
            
            // محاولة جلب من API بديل (NewsAPI.org - مجاني ومحدود)
            // ملاحظة: هذا يتطلب مفتاح API، نستخدم طريقة بديلة
            
            // إذا فشل الجلب، نستخدم أخبار محدثة بالتاريخ والوقت الحالي
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            const dateStr = now.toLocaleDateString('ar-EG');
            
            // تحديث أوقات الأخبار الاحتياطية
            fetchedNews = fallbackNews.map(news => ({
                ...news,
                time: `${timeStr} - ${dateStr}`
            }));
            
            // خلط الأخبار لإظهار ترتيب مختلف مع كل تحديث
            fetchedNews = shuffleArray(fetchedNews);
            
            return fetchedNews;
        } catch (error) {
            console.warn('خطأ في جلب الأخبار:', error);
            // إرجاع الأخبار الاحتياطية مع تحديث الوقت
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG');
            const dateStr = now.toLocaleDateString('ar-EG');
            return fallbackNews.map(news => ({
                ...news,
                time: `${timeStr} - ${dateStr}`
            }));
        }
    }

    // دالة لخلط المصفوفة (لإظهار ترتيب مختلف مع كل تحديث)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // عرض الأخبار في الواجهة
    function displayNews(newsDataToShow) {
        const newsListDiv = document.getElementById('newsList');
        const newsUpdateTimeSpan = document.getElementById('newsUpdateTime');
        const now = new Date();
        
        newsUpdateTimeSpan.innerHTML = `آخر تحديث للأخبار: ${now.toLocaleTimeString('ar-EG')} - ${now.toLocaleDateString('ar-EG')}`;
        
        if (!newsDataToShow || newsDataToShow.length === 0) {
            newsListDiv.innerHTML = '<div style="padding: 10px; text-align: center;">⚠️ لا توجد أخبار حالياً</div>';
            return;
        }
        
        newsListDiv.innerHTML = newsDataToShow.map(news => `
            <div class="news-item">
                <a href="${news.url || '#'}" target="_blank" rel="noopener noreferrer" class="news-link" ${!news.url ? 'style="cursor: default;"' : ''}>
                    <span class="news-icon">${news.icon || '📰'}</span>
                    ${news.title}
                </a>
                <div class="news-source">
                    <span>📰 المصدر: ${news.source}</span>
                    <span>🕐 ${news.time || ''}</span>
                    ${news.url ? '<span>🔗 اضغط للقراءة كاملة</span>' : ''}
                </div>
            </div>
        `).join('');
    }

    // تحديث الأخبار بشكل كامل
    async function refreshNews() {
        const newsListDiv = document.getElementById('newsList');
        newsListDiv.innerHTML = '<div style="padding: 10px;">🔄 جاري تحديث الأخبار...</div>';
        
        const newNews = await fetchLatestNews();
        currentNewsData = newNews;
        displayNews(currentNewsData);
        
        // حفظ الأخبار في localStorage
        localStorage.setItem('latestNews', JSON.stringify({
            data: currentNewsData,
            timestamp: Date.now()
        }));
    }

    // تحميل الأخبار من localStorage أو جلب جديدة
    async function loadNews() {
        const stored = localStorage.getItem('latestNews');
        const now = Date.now();
        
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                // إذا كانت الأخبار قديمة (أكثر من ساعة)، نجددها
                if (now - parsed.timestamp < 3600000) {
                    currentNewsData = parsed.data;
                    displayNews(currentNewsData);
                    // تحديث في الخلفية
                    setTimeout(() => refreshNews(), 1000);
                    return;
                }
            } catch(e) {}
        }
        
        // جلب أخبار جديدة
        await refreshNews();
    }

    // وظائف الأسعار (مثل السابق مع تحسينات)
    function loadStoredData() {
        let stored = localStorage.getItem('goldPricesFast');
        if(stored){
            let data = JSON.parse(stored);
            if(data.globalUSD) globalGoldUSD = data.globalUSD;
            if(data.chartHistory) chartHistory = data.chartHistory;
            if(data.alertTarget) alertTarget = data.alertTarget;
            if(data.exchangeRate) exchangeRate = data.exchangeRate;
        }
        if(chartHistory.length === 0){
            for(let i=0;i<24;i++) chartHistory.push(globalGoldUSD);
        }
        calculateAllPrices();
    }

    function saveToLocalStorage() {
        let data = { globalUSD: globalGoldUSD, exchangeRate, chartHistory, alertTarget };
        localStorage.setItem('goldPricesFast', JSON.stringify(data));
    }

    function calculateAllPrices() {
        alfardanGoldUSD = globalGoldUSD * (1 + ALFARDAN_MARGIN/100);
        alfardanGoldQAR = alfardanGoldUSD * exchangeRate;
        pampGoldUSD = globalGoldUSD * (1 + PAMP_MARGIN/100);
        pampGoldQAR = pampGoldUSD * exchangeRate;
        globalGoldQAR = globalGoldUSD * exchangeRate;
        saveToLocalStorage();
    }

    function updateUI() {
        const cards = [
            { icon: "🌍", title: "السوق العالمي", src: "GoldAPI.io", usd: globalGoldUSD, qar: globalGoldQAR },
            { icon: "🏦", title: "الفردان للصرافة", src: "سعر التجزئة قطر", usd: alfardanGoldUSD, qar: alfardanGoldQAR },
            { icon: "🏭", title: "سبائك PAMP", src: "استثمارية", usd: pampGoldUSD, qar: pampGoldQAR }
        ];
        
        const pricesGrid = document.getElementById('pricesGrid');
        pricesGrid.innerHTML = cards.map(card => `
            <div class="price-card">
                <div class="price-header"><div class="icon">${card.icon}</div><div><h2>${card.title}</h2><div class="source">${card.src}</div></div></div>
                <div class="price-amount"><span class="price-number">${card.usd.toFixed(2)}</span> <span class="currency">USD</span></div>
                <div class="price-amount"><span class="price-number">${card.qar.toFixed(2)}</span> <span class="currency">QAR</span></div>
                <div class="daily-change ${dailyChangePercent >= 0 ? 'positive' : 'negative'}">📊 التغير اليومي: ${dailyChangePercent >= 0 ? '+' : ''}${dailyChangePercent.toFixed(2)}% (${dailyChangeUSD >= 0 ? '+' : ''}${dailyChangeUSD.toFixed(2)} USD)</div>
            </div>
        `).join('');
        
        document.getElementById('lastUpdateInfo').innerHTML = `✅ آخر تحديث: ${new Date().toLocaleTimeString('ar-EG')}`;
        
        if(alertTarget && alfardanGoldQAR >= alertTarget) {
            alert(`🔔 تم تحقيق الهدف! سعر الفردان الآن ${alfardanGoldQAR.toFixed(2)} ريال قطري`);
            alertTarget = null;
            saveToLocalStorage();
        }
    }

    function updateChart() {
        if(chart) chart.destroy();
        const ctx = document.getElementById('goldChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: Array.from({length: chartHistory.length}, (_,i)=> i+1 + ' ساعة'), datasets: [{ label: 'سعر الذهب (USD)', data: chartHistory, borderColor: '#e6b422', backgroundColor: 'rgba(230,180,34,0.1)', fill: true, tension: 0.3 }] },
            options: { responsive: true, maintainAspectRatio: true, animation: false, plugins: { legend: { position: 'top', rtl: true } } }
        });
    }

    async function fetchGoldPrice() {
        if(isFetching) return false;
        isFetching = true;
        
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            
            const res = await fetch('https://www.goldapi.io/api/XAU/USD', { 
                headers: { 'x-access-token': 'demo' },
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            
            if(res.ok){
                const data = await res.json();
                if(data.price) {
                    let newPrice = parseFloat(data.price);
                    if(chartHistory.length >= 24) chartHistory.shift();
                    chartHistory.push(newPrice);
                    if(globalGoldUSD !== 0) {
                        dailyChangeUSD = newPrice - globalGoldUSD;
                        dailyChangePercent = (dailyChangeUSD / globalGoldUSD) * 100;
                    }
                    globalGoldUSD = newPrice;
                }
            }
            
            const exRes = await fetch('https://api.exchangerate.host/latest?base=USD&symbols=QAR');
            if(exRes.ok) {
                const exData = await exRes.json();
                if(exData.rates?.QAR) exchangeRate = parseFloat(exData.rates.QAR);
            }
            
            calculateAllPrices();
            updateUI();
            updateChart();
            saveToLocalStorage();
            return true;
        } catch(e) {
            console.warn('Fetch error:', e);
            return false;
        } finally {
            isFetching = false;
        }
    }

    async function fullRefresh() {
        const spinnerIcon = document.getElementById('spinnerIcon');
        const autoStatusSpan = document.getElementById('autoStatus');
        
        spinnerIcon.style.display = 'inline-block';
        autoStatusSpan.innerHTML = '🔄 جلب أحدث الأسعار...';
        
        await fetchGoldPrice();
        
        spinnerIcon.style.display = 'none';
        autoStatusSpan.innerHTML = `✅ تم التحديث الساعة ${new Date().toLocaleTimeString('ar-EG')}`;
        
        setTimeout(() => { 
            if(autoStatusSpan.innerHTML.includes('تم التحديث')) {
                autoStatusSpan.innerHTML = '⏳ جاهز';
            }
        }, 3000);
    }

    function startAutoRefresh(minutes) {
        if(updateIntervalId) clearInterval(updateIntervalId);
        updateIntervalId = setInterval(fullRefresh, minutes * 60 * 1000);
    }
    
    function startNewsAutoRefresh() {
        if(newsUpdateIntervalId) clearInterval(newsUpdateIntervalId);
        // تحديث الأخبار كل ساعة
        newsUpdateIntervalId = setInterval(refreshNews, 3600000);
    }

    // Event Listeners
    document.getElementById('shareBtn').onclick = () => {
        let text = `سعر الذهب اليوم:\nالعالمي: ${globalGoldUSD} دولار (${globalGoldQAR.toFixed(2)} ريال)\nالفردان: ${alfardanGoldQAR.toFixed(2)} ريال\nPAMP: ${pampGoldQAR.toFixed(2)} ريال`;
        if(navigator.share) navigator.share({title: 'أسعار الذهب', text});
        else alert(text);
    };

    document.getElementById('alertSettingBtn').onclick = () => { document.getElementById('alertPanel').style.display = 'flex'; };
    document.getElementById('cancelAlertBtn').onclick = () => { document.getElementById('alertPanel').style.display = 'none'; };
    document.getElementById('saveAlertBtn').onclick = () => {
        let val = parseFloat(document.getElementById('alertPriceInput').value);
        if(!isNaN(val) && val > 0) {
            alertTarget = val;
            saveToLocalStorage();
            document.getElementById('alertPanel').style.display = 'none';
            document.getElementById('autoStatus').innerHTML = `🔔 تم تعيين التنبيه عند ${val} ريال`;
            setTimeout(()=> document.getElementById('autoStatus').innerHTML='⏳ جاهز', 3000);
        } else alert('أدخل رقماً صحيحاً');
    };

    document.getElementById('refreshIntervalSelect').onchange = () => {
        currentIntervalMinutes = parseInt(document.getElementById('refreshIntervalSelect').value);
        startAutoRefresh(currentIntervalMinutes);
        document.getElementById('autoStatus').innerHTML = `🔄 التحديث كل ${currentIntervalMinutes} دقيقة`;
    };

    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerHTML = document.body.classList.contains('dark') ? '☀️ وضع النهار' : '🌙 الوضع الليلي';
    };

    document.getElementById('refreshBtn').onclick = async () => { await fullRefresh(); };
    document.getElementById('newsRefreshBtn').onclick = async () => { await refreshNews(); };

    // التهيئة الرئيسية
    async function init() {
        loadStoredData();
        updateUI();
        updateChart();
        
        // تحميل الأخبار (محدثة فوراً)
        await loadNews();
        
        // بدء التحديثات
        startAutoRefresh(currentIntervalMinutes);
        startNewsAutoRefresh();
        
        // تحديث الأسعار في الخلفية
        setTimeout(() => fetchGoldPrice(), 500);
    }
    
    init();
</script>
</body>
</html>
