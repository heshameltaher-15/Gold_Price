<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>بورصة الذهب القطرية | الأونصة</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.2s ease; }
        :root {
            --bg-gradient-start: #0a1a1f; --bg-gradient-end: #061015;
            --card-bg: #fffef8; --header-bg: linear-gradient(115deg, #e6b422 0%, #c47e1a 100%);
            --text-primary: #1f2a1b; --text-secondary: #7a531d;
            --border-color: #f0e2ce; --price-color: #1f4a5a;
            --status-bg: #f4ede0; --footnote-bg: #fcf8ef;
        }
        body.dark {
            --bg-gradient-start: #0a0a0a; --bg-gradient-end: #000000;
            --card-bg: #1a1a2e; --header-bg: linear-gradient(115deg, #5a3a0a 0%, #3a2505 100%);
            --text-primary: #e0d6b0; --text-secondary: #d4a843;
            --border-color: #2a2a3a; --price-color: #6ab0c0;
            --status-bg: #2a2a3a; --footnote-bg: #1a1a2e;
        }
        body { background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .main-card { background: var(--card-bg); border-radius: 48px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); overflow: hidden; }
        .header { background: var(--header-bg); padding: 25px; text-align: center; color: var(--text-primary); position: relative; }
        .header h1 { font-size: 1.8rem; font-weight: 800; }
        .theme-toggle { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.3); border: none; border-radius: 50px; padding: 8px 15px; color: white; cursor: pointer; }
        .controls-bar { background: var(--status-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .prices-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 25px; }
        @media (max-width: 900px) { .prices-grid { grid-template-columns: 1fr; } }
        .price-card { background: var(--card-bg); border-radius: 32px; padding: 20px; border: 1px solid var(--border-color); box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        .price-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; border-bottom: 2px solid var(--border-color); padding-bottom: 12px; }
        .price-header h2 { font-size: 1.1rem; color: var(--text-secondary); }
        .price-amount { margin: 12px 0; display: flex; align-items: baseline; justify-content: flex-start; gap: 8px; }
        .price-label { font-size: 0.8rem; color: #b87a2e; font-weight: bold; min-width: 35px; }
        .price-number { font-size: 2.2rem; font-weight: 800; color: var(--price-color); }
        .chart-container { padding: 20px 25px; border-top: 1px solid var(--border-color); }
        .news-section { padding: 20px 25px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.01); }
        .news-title { font-weight: bold; margin-bottom: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
        .news-item { font-size: 0.88rem; padding: 12px 0; border-bottom: 1px dashed var(--border-color); display: block; text-decoration: none; color: var(--price-color); line-height: 1.6; }
        .status-bar { background: var(--status-bg); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-refresh { background: #c2822c; border: none; padding: 10px 25px; border-radius: 40px; color: white; cursor: pointer; font-weight: bold; }
        .spinner { width: 16px; height: 16px; border: 2px solid #fff; border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; margin-left: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <div class="header">
            <button class="theme-toggle" id="themeToggle">🌙 الوضع الليلي</button>
            <h1>📊 بورصة الذهب المباشرة <span>قطر & عالمياً</span></h1>
        </div>

        <div class="controls-bar">
            <div>
                <label>⏱️ تحديث:</label>
                <select id="refreshIntervalSelect" style="padding: 5px; border-radius: 10px; border: 1px solid var(--border-color);">
                    <option value="15">15 دقيقة</option>
                    <option value="60" selected>ساعة</option>
                </select>
            </div>
            <button id="shareBtn" style="background:#c2822c; color:white; border:none; padding: 8px 20px; border-radius: 20px; cursor:pointer;">📤 مشاركة السعر</button>
        </div>

        <div class="prices-grid" id="pricesGrid"></div>

        <div class="chart-container">
            <canvas id="goldChart" style="max-height: 250px; width: 100%;"></canvas>
        </div>

        <div class="news-section">
            <div class="news-title">📰 آخر أخبار الذهب الاقتصادية (تحديث لحظي بالعربية)</div>
            <div id="newsList">جاري جلب آخر التقارير الاقتصادية...</div>
        </div>

        <div class="status-bar">
            <div id="autoStatus" style="font-size: 0.85rem; color: #b59762;">⏳ جاهز للتحديث</div>
            <button class="btn-refresh" id="refreshBtn">🔄 تحديث البيانات الآن</button>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'goldapi-14r6r2smned9zw6-io'; 
    let globalGoldUSD = 4571.20; 
    let exchangeRate = 3.64;
    let chartHistory = [];
    let chart = null;

    // نسبة الفردان المستخرجة من تحليلك السابق (12.35% فوق السعر العالمي)
    const ALFARDAN_PREMIUM = 1.1235; 

    async function updateAllData() {
        const btn = document.getElementById('refreshBtn');
        btn.innerHTML = '<span class="spinner"></span> جاري التحديث...';
        
        try {
            const res = await fetch('https://www.goldapi.io/api/XAU/USD', { 
                headers: { 'x-access-token': API_KEY } 
            });
            const data = await res.json();
            if(data.price) {
                globalGoldUSD = data.price;
                if(chartHistory.length >= 24) chartHistory.shift();
                chartHistory.push(globalGoldUSD);
            }

            await fetchArabicNews();
            renderPrices();
            updateChart();
            
        } catch(e) {
            console.log("Error during update");
        }
        btn.innerHTML = '🔄 تحديث البيانات الآن';
    }

    function renderPrices() {
        // الحسابات بناءً على النسبة التي طلبت ضبطها
        const cards = [
            { 
                title: "السعر العالمي", 
                icon: "🌍", 
                usd: globalGoldUSD, 
                qar: globalGoldUSD * exchangeRate, 
                src: "GoldAPI.io" 
            },
            { 
                title: "الفردان للصرافة", 
                icon: "🏦", 
                usd: globalGoldUSD * ALFARDAN_PREMIUM, 
                qar: (globalGoldUSD * ALFARDAN_PREMIUM) * exchangeRate, 
                src: "سعر التجزئة قطر" 
            },
            { 
                title: "سبائك PAMP", 
                icon: "🏭", 
                // إضافة هامش طفيف فوق سعر الفردان لمحاكاة فرق السبيكة
                usd: globalGoldUSD * (ALFARDAN_PREMIUM + 0.025), 
                qar: (globalGoldUSD * (ALFARDAN_PREMIUM + 0.025)) * exchangeRate, 
                src: "استثمارية" 
            }
        ];

        document.getElementById('pricesGrid').innerHTML = cards.map(c => `
            <div class="price-card">
                <div class="price-header">
                    <div style="font-size: 1.5rem;">${c.icon}</div>
                    <div><h2>${c.title}</h2><div style="font-size:0.65rem; color:#999;">${c.src}</div></div>
                </div>
                <div class="price-amount">
                    <span class="price-label">USD</span>
                    <span class="price-number">${c.usd.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
                <div class="price-amount">
                    <span class="price-label">QAR</span>
                    <span class="price-number">${c.qar.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                </div>
            </div>
        `).join('');
    }

    async function fetchArabicNews() {
        const newsListDiv = document.getElementById('newsList');
        try {
            const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=أسعار+الذهب+اقتصاد&hl=ar&gl=AE&ceid=AE:ar');
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
            const data = await res.json();
            if(data.status === 'ok' && data.items.length > 0) {
                newsListDiv.innerHTML = data.items.slice(0, 6).map(item => `
                    <a href="${item.link}" target="_blank" class="news-item">
                        <span>(${new Date(item.pubDate).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'})})</span>
                        ${item.title.split(' - ')[0]} 
                    </a>
                `).join('');
            }
        } catch(e) {
            newsListDiv.innerHTML = '⚠️ تعذر جلب الأخبار العربية حالياً.';
        }
    }

    function updateChart() {
        const ctx = document.getElementById('goldChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartHistory.map((_, i) => i),
                datasets: [{ 
                    label: 'السعر العالمي', 
                    data: chartHistory, 
                    borderColor: '#e6b422', 
                    borderWidth: 3,
                    pointRadius: 0,
                    backgroundColor: 'rgba(230,180,34,0.1)', 
                    fill: true, 
                    tension: 0.4 
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { x: { display: false }, y: { grid: { color: 'rgba(0,0,0,0.05)' } } }
            }
        });
    }

    document.getElementById('themeToggle').onclick = () => {
        document.body.classList.toggle('dark');
        document.getElementById('themeToggle').innerText = document.body.classList.contains('dark') ? '☀️ وضع النهار' : '🌙 الوضع الليلي';
    };

    document.getElementById('refreshBtn').onclick = updateAllData;

    // بيانات وهمية للبداية
    for(let i=0; i<15; i++) chartHistory.push(4550 + Math.random()*20);
    
    updateAllData();
</script>

</body>
</html>
