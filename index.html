<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ذهب قطر | أسعار الذهب</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* نفس CSS بدون تغيير */
</style>
</head>

<body>
<div id="newsList">⏳ جاري تحميل الأخبار بسرعة...</div>
<canvas id="goldChart"></canvas>

<script>

// ---------- المتغيرات ----------
let globalGoldUSD = 4566.50, globalGoldQAR = 16622.06;
let alfardanGoldUSD = 5130.00, alfardanGoldQAR = 18675.00;
let pampGoldUSD = 4794.82, pampGoldQAR = 17453.16;
let exchangeRate = 3.64;
let chartHistory = [];
let chart = null;
let isFetching = false;

const ALFARDAN_MARGIN = 12.35;
const PAMP_MARGIN = 5.0;

const newsData = [
    { title: "📈 الذهب يرتفع مع تراجع الدولار", source: "Bloomberg" },
    { title: "🏦 البنوك المركزية تشتري الذهب", source: "Reuters" },
    { title: "⚡ التوترات تزيد الطلب على الذهب", source: "CNBC" }
];

// ---------- تحميل البيانات ----------
function loadStoredData() {
    let stored = localStorage.getItem('goldPricesFast');
    if(stored){
        let data = JSON.parse(stored);
        if(data.globalUSD) globalGoldUSD = data.globalUSD;
        if(data.chartHistory) chartHistory = data.chartHistory;
    }

    if(chartHistory.length === 0){
        for(let i=0;i<24;i++) chartHistory.push(globalGoldUSD);
    }
}

// ---------- الحساب ----------
function calculateAllPrices() {
    alfardanGoldUSD = globalGoldUSD * (1 + ALFARDAN_MARGIN/100);
    pampGoldUSD = globalGoldUSD * (1 + PAMP_MARGIN/100);
}

// ---------- عرض الأخبار (محسّن) ----------
let newsLoaded = false;

function displayNews() {
    if(newsLoaded) return;
    newsLoaded = true;

    const newsListDiv = document.getElementById('newsList');

    newsListDiv.innerHTML = newsData.map(news => `
        <div style="padding:8px;border-bottom:1px solid #ddd;">
            ${news.title}
            <div style="font-size:12px;color:#777;">${news.source}</div>
        </div>
    `).join('');
}

// ---------- الرسم ----------
function updateChart() {
    if(chart) chart.destroy();

    const ctx = document.getElementById('goldChart').getContext('2d');

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartHistory.map((_,i)=>i),
            datasets: [{
                data: chartHistory,
                borderColor: '#e6b422',
                fill: true
            }]
        },
        options: {
            animation: false, // 🔥 مهم
            responsive: true
        }
    });
}

// ---------- جلب البيانات ----------
async function fetchData() {
    if(isFetching) return;
    isFetching = true;

    try {
        const res = await fetch('https://www.goldapi.io/api/XAU/USD', {
            headers: { 'x-access-token': 'demo' }
        });

        if(res.ok){
            const data = await res.json();
            globalGoldUSD = data.price;
        }

        calculateAllPrices();
        updateChart();

    } catch(e) {
        console.log("error");
    }

    isFetching = false;
}

// ---------- التهيئة (المهم 🔥) ----------
function init() {

    loadStoredData();

    // 🔥 عرض الأخبار فوراً (بدون تأخير)
    requestAnimationFrame(() => {
        displayNews();
    });

    // 🔥 تأجيل العمليات الثقيلة
    setTimeout(() => {
        calculateAllPrices();
        updateChart();
    }, 0);

    // 🔥 جلب البيانات لاحقاً
    setTimeout(() => {
        fetchData();
    }, 500);
}

init();

</script>
</body>
</html>
